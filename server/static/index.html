<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kanban</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    // Apply the saved theme (or system preference) before first paint to
    // avoid a flash of the wrong mode. The full toggle lives in script.js.
    (function () {
      try {
        var saved = localStorage.getItem('kanban-theme');
        var prefersDark = window.matchMedia &&
          window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { /* localStorage may be blocked; default to light */ }
    })();
  </script>
</head>
<body>

<header class="topbar">
  <h1>Kanban</h1>
  <div class="topbar-actions">
    <button id="theme-toggle" class="btn icon-btn" type="button" aria-label="Toggle dark mode" aria-pressed="false" title="Toggle dark mode">
      <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2"  x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2"  y1="12" x2="5"  y2="12"/>
        <line x1="19" y1="12" x2="22" y2="12"/>
        <line x1="4.6" y1="4.6"  x2="6.7" y2="6.7"/>
        <line x1="17.3" y1="17.3" x2="19.4" y2="19.4"/>
        <line x1="4.6" y1="19.4" x2="6.7" y2="17.3"/>
        <line x1="17.3" y1="6.7"  x2="19.4" y2="4.6"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M20 14.5A8 8 0 0 1 9.5 4 8 8 0 1 0 20 14.5Z"/>
      </svg>
    </button>
    <button id="add-column" class="btn">Add column</button>
    <button id="add-card" class="btn primary">Add card</button>
  </div>
</header>

<main class="board">
  <!-- Columns rendered by JS -->
</main>

<!-- Card details / edit modal -->
<dialog id="card-modal" class="modal">
  <form id="card-form" method="dialog">
    <label>
      <span>Title</span>
      <input id="card-title" type="text" required maxlength="200" />
    </label>
    <label>
      <span>Description</span>
      <div class="desc-wrap">
        <textarea id="card-description" rows="6" maxlength="4000"></textarea>
        <div id="mention-suggestions" class="mention-dropdown" hidden></div>
      </div>
    </label>
    <label>
      <span>Project</span>
      <select id="card-project">
        <option value="">— none —</option>
        <!-- populated by script.js -->
      </select>
    </label>
    <label>
      <span>Column</span>
      <!-- Options are populated from the live column list when the modal opens. -->
      <select id="card-column"></select>
    </label>
    <label>
      <span>Colour</span>
      <select id="card-color">
        <option value="">— none —</option>
        <option value="red">Red</option>
        <option value="orange">Orange</option>
        <option value="yellow">Yellow</option>
        <option value="green">Green</option>
        <option value="blue">Blue</option>
        <option value="purple">Purple</option>
        <option value="grey">Grey</option>
      </select>
    </label>
    <div class="attach-group">
      <span class="attach-group-label">Attachments</span>
      <div id="attach-drop" class="attach-drop">
        Drop files here or <button type="button" id="attach-pick" class="btn-link">browse</button>
        <input type="file" id="attach-input" multiple hidden />
      </div>
      <ul id="attach-list" class="attach-list"></ul>
    </div>
    <footer class="modal-footer">
      <button type="button" id="card-delete" class="btn danger" hidden>Delete</button>
      <span class="spacer"></span>
      <button type="button" id="card-cancel" class="btn">Cancel</button>
      <button type="submit" class="btn primary">Save</button>
    </footer>
  </form>
</dialog>

<!-- Column action sheet (rename / delete), opened by long-press or right-click. -->
<dialog id="column-menu" class="modal">
  <h3 id="column-menu-title" class="menu-title"></h3>
  <div class="menu-actions">
    <button type="button" id="column-move-left" class="btn">Move left</button>
    <button type="button" id="column-move-right" class="btn">Move right</button>
    <button type="button" id="column-rename" class="btn">Rename</button>
    <button type="button" id="column-delete" class="btn danger">Delete column</button>
    <button type="button" id="column-menu-cancel" class="btn">Cancel</button>
  </div>
</dialog>

<!-- Generic confirmation box. -->
<dialog id="confirm-box" class="modal">
  <p id="confirm-message"></p>
  <footer class="modal-footer">
    <span class="spacer"></span>
    <button type="button" id="confirm-cancel" class="btn">Cancel</button>
    <button type="button" id="confirm-ok" class="btn danger">Delete</button>
  </footer>
</dialog>

<script src="script.js"></script>
</body>
</html>
